<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery with JavaScript</title>
    <link rel="stylesheet" href="style.css">
    <!-- Add font-awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <!-- ---------------- Search Section ---------------- -->
    <section class="search">
        <img src="search-img.jpg" alt="search-img">
        <div class="content">
            <h1>Image Gallery with JavaScript</h1>
            <p>Search and Download any Image within a second</p>
            <div class="search-box">
                <input type="text" placeholder="Search the image">
            </div>
        </div>
    </section>

    <!-- ---------------- Gallery Section ---------------- -->
    <section class="gallery">
        <ul class="images">
           
        </ul>

        <button class="load-more">Load More</button>
    </section>


    <script src="app.js" defer></script>
</body>

</html>
